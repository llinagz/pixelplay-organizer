<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fondo oscuro pixel -->
  <rect width="512" height="512" fill="#150E09"/>
  <!-- Cuadrícula pixel decorativa (borde) -->
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#B8860B" stroke-width="8"/>
  <rect x="48" y="48" width="416" height="416" fill="none" stroke="#CC8A2E" stroke-width="4"/>
  <!-- Gamepad pixel-art (escalado) -->
  <!-- Cuerpo del mando -->
  <rect x="96" y="176" width="320" height="160" fill="#3D2814"/>
  <rect x="112" y="160" width="288" height="16" fill="#3D2814"/>
  <rect x="112" y="336" width="288" height="16" fill="#3D2814"/>
  <rect x="80" y="192" width="16" height="128" fill="#3D2814"/>
  <rect x="416" y="192" width="16" height="128" fill="#3D2814"/>
  <!-- D-Pad (cruceta) -->
  <rect x="144" y="208" width="16" height="80" fill="#CC8A2E"/>
  <rect x="120" y="232" width="64" height="16" fill="#CC8A2E"/>
  <!-- Botones A/B -->
  <rect x="320" y="208" width="32" height="32" fill="#22C55E"/>
  <rect x="368" y="240" width="32" height="32" fill="#EF4444"/>
  <!-- Texto "BACKLOG" pixel -->
  <rect x="112" y="380" width="288" height="4" fill="#CC8A2E" opacity="0.3"/>
  <!-- Texto "BP" grande -->
  <rect x="192" y="384" width="16" height="64" fill="#CC8A2E"/>
  <rect x="208" y="384" width="16" height="8" fill="#CC8A2E"/>
  <rect x="208" y="408" width="16" height="8" fill="#CC8A2E"/>
  <rect x="208" y="432" width="8" height="8" fill="#CC8A2E"/>
  <rect x="240" y="384" width="16" height="64" fill="#CC8A2E"/>
  <rect x="256" y="384" width="16" height="8" fill="#CC8A2E"/>
  <rect x="256" y="408" width="16" height="8" fill="#CC8A2E"/>
  <rect x="256" y="432" width="8" height="16" fill="#CC8A2E"/>
  <!-- Estrellas decorativas pixel -->
  <rect x="72" y="72" width="8" height="8" fill="#CC8A2E"/>
  <rect x="432" y="72" width="8" height="8" fill="#CC8A2E"/>
  <rect x="72" y="432" width="8" height="8" fill="#CC8A2E"/>
  <rect x="432" y="432" width="8" height="8" fill="#CC8A2E"/>
  <rect x="248" y="88" width="16" height="16" fill="#D4A843"/>
</svg>
