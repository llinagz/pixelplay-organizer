  <rect x="108" y="140" width="8" height="4" fill="#CC8A2E"/>
  <rect x="108" y="148" width="8" height="4" fill="#CC8A2E"/>
  <rect x="108" y="156" width="4" height="8" fill="#CC8A2E"/>
</svg>
